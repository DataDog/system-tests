# ──────────────────────────────────────────────
# End-to-end pipeline — only for the system-tests repo
# ──────────────────────────────────────────────

system-tests-param:
  image: $CI_IMAGE
  stage: build
  tags:
    - arch:amd64
  needs:
    - job: build_ci_image
      artifacts: true
  script:
    - ln -sf /system-tests/venv venv
    - source venv/bin/activate
    - export PYTHONPATH=$(pwd)
    - git fetch origin main
    - mkdir -p original && git archive origin/main -- manifests/ | tar -xC original/
    - git diff origin/main...HEAD --name-only > modified_files.txt
    - ./run.sh MOCK_THE_TEST --collect-only --scenario-report
    - python3 utils/scripts/compute_libraries_and_scenarios.py --output raw_params.txt
    - |
      python3 -c "
      import json
      with open('raw_params.txt') as f:
          for line in f:
              line = line.strip()
              if '=' not in line: continue
              key, val = line.split('=', 1)
              val = json.loads(val)
              if key == 'libraries': print(f'LIBRARIES={val}')
              elif key == 'scenarios': print(f'SCENARIOS={val}')
              elif key == 'scenarios_groups': print(f'SCENARIO_GROUPS={val}')
      " > param.env
    - cat param.env
  artifacts:
    reports:
      dotenv: param.env

build_ci_image:
  image: registry.ddbuild.io/images/docker:20.10.13-jammy
  interruptible: true
  tags:
    - docker-in-docker:amd64
  stage: build
  script:
    - IMAGE_TAG=$(cat utils/ci/gitlab/docker/system-tests.Dockerfile requirements.txt | sha256sum | cut -c1-12)
    - echo "CI_IMAGE=registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG" >> build.env
    - >
      if docker manifest inspect registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG > /dev/null 2>&1; then
        echo "Image already exists, skipping build";
      else
        docker build -f utils/ci/gitlab/docker/system-tests.Dockerfile -t registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG . &&
        docker push registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG;
      fi
  artifacts:
    reports:
      dotenv: build.env
