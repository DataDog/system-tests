include:
  - remote: https://gitlab-templates.ddbuild.io/libdatadog/one-pipeline/ca/2fc0ca684c4322af76c172905af32c6c583303dcecb07dba05bac5f85b7606ae/single-step-instrumentation-tests.yml
stages:
  - K8S_LIB_INJECTION
variables:
  PRIVATE_DOCKER_REGISTRY: 235494822917.dkr.ecr.us-east-1.amazonaws.com
  PRIVATE_DOCKER_REGISTRY_USER: AWS
.k8s_lib_injection_base:
  extends: .base_job_k8s_docker_ssi
  tags:
    - docker-in-docker:amd64
  needs: []
  stage: K8S_LIB_INJECTION
  allow_failure: false
  timeout: 35 minutes
  variables:
    FF_USE_NEW_BASH_EVAL_STRATEGY: true
  script:
    - cd /system-tests
    - aws ecr get-login-password | docker login --username ${PRIVATE_DOCKER_REGISTRY_USER}
      --password-stdin ${PRIVATE_DOCKER_REGISTRY}
    - export PRIVATE_DOCKER_REGISTRY_TOKEN=$(aws ecr get-login-password --region us-east-1)
    - ./run.sh ${K8S_SCENARIO} --k8s-library ${TEST_LIBRARY} --k8s-weblog ${K8S_WEBLOG}
      --k8s-weblog-img ${K8S_WEBLOG_IMG}:${TAG_NAME} --k8s-lib-init-img ${K8S_LIB_INIT_IMG}
      --k8s-injector-img ${K8S_INJECTOR_IMG} --k8s-cluster-img ${K8S_CLUSTER_IMG} --report-run-url
      $CI_JOB_URL --report-environment ${REPORT_ENVIRONMENT}
  after_script:
    - echo "=== DEBUG INFORMATION ==="
    - echo "=== Cluster State ==="
    - kubectl get nodes --show-labels || echo "Failed to get nodes"
    - kubectl get namespaces || echo "Failed to get namespaces"
    - kubectl get pods --all-namespaces || echo "Failed to get pods"
    - kubectl cluster-info || echo "Failed to get cluster info"
    - kubectl cluster-info --context kind-lib-injection-testing || echo "Failed to get kind cluster info"
    - cat $HOME/.kube/config || echo "Failed to read kubeconfig"
    - echo "=== Kind Cluster Debug ==="
    - kind get clusters || echo "Failed to list kind clusters"
    - kind get nodes --name lib-injection-testing || echo "Failed to list kind nodes"
    - kind get kubeconfig --name lib-injection-testing || echo "Failed to get kind kubeconfig"
    - docker ps --filter name=lib-injection-testing || echo "Failed to list kind containers"
    - echo "=== DaemonSet Debug ==="
    - kubectl get daemonsets -n default || echo "Failed to get daemonsets"
    - kubectl describe daemonset datadog -n default || echo "DaemonSet not found"
    - kubectl get pods -l app=datadog -n default || echo "Failed to get datadog pods"
    - kubectl describe pods -l app=datadog -n default || echo "No datadog pods found"
    - kubectl get events -n default --sort-by='.lastTimestamp' | tail -20 || echo "Failed to get events"
    - echo "=== Docker Images Debug ==="
    - docker images | grep -E '(kindest|datadog|dd-apm-test-agent)' || echo "No relevant images found"
    - echo "=== End Debug Information ==="
    - kind delete clusters --all || true
    - mkdir -p reports
    - |
      if [ "$CI_PROJECT_NAME" = "system-tests" ]; then
        cp -R logs_*/ reports/;
      else
        cp -R /system-tests/logs_*/ reports/;
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] && [ "$CI_PROJECT_NAME" = "system-tests" ]; then
        export FP_IMPORT_URL=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.fp-import-url --with-decryption --query "Parameter.Value" --out text);
        export FP_API_KEY=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.fp-api-key --with-decryption --query "Parameter.Value" --out text);
        for folder in reports/logs*/ ; do
          echo "Checking folder: ${folder}";
          for filename in ./${folder}feature_parity.json; do
            if [ -e ${filename} ]; then
              echo "Processing report: ${filename}";
              curl -X POST ${FP_IMPORT_URL} --fail --header "Content-Type: application/json" --header "FP_API_KEY: ${FP_API_KEY}" --data "@${filename}" --include;
            fi;
          done;
        done;
      fi
  retry:
    max: 2
    when:
      - unknown_failure
      - data_integrity_failure
      - runner_system_failure
      - scheduler_failure
      - api_failure
    exit_codes:
      - 3
  artifacts:
    when: always
    paths:
      - reports/

.k8s_lib_injection_matrix:
  matrix:
    - K8S_WEBLOG: dd-lib-python-init-test-django
      K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-django
      K8S_CLUSTER_IMG:
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:latest
    - K8S_WEBLOG: dd-lib-python-init-test-django-gunicorn
      K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-django-gunicorn
      K8S_CLUSTER_IMG:
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:latest
    - K8S_WEBLOG: dd-lib-python-init-test-django-gunicorn-alpine
      K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-django-gunicorn-alpine
      K8S_CLUSTER_IMG:
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:latest
    - K8S_WEBLOG: dd-lib-python-init-test-django-unsupported-package-force
      K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-django-unsupported-package-force
      K8S_CLUSTER_IMG:
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:latest
    - K8S_WEBLOG: dd-lib-python-init-test-django-uvicorn
      K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-django-uvicorn
      K8S_CLUSTER_IMG:
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:latest
    - K8S_WEBLOG: dd-lib-python-init-test-protobuf-old
      K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-protobuf-old
      K8S_CLUSTER_IMG:
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2
        - 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:latest

K8S_LIB_INJECTION:
  extends: .k8s_lib_injection_base
  variables:
    TEST_LIBRARY: python
    K8S_SCENARIO: K8S_LIB_INJECTION
    REPORT_ENVIRONMENT: prod
    K8S_LIB_INIT_IMG: 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/dd-lib-python-init:latest
    K8S_INJECTOR_IMG: 235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/apm-inject:latest
    K8S_WEBLOG: dd-lib-python-init-test-django
    K8S_WEBLOG_IMG: ${PRIVATE_DOCKER_REGISTRY}/system-tests/dd-lib-python-init-test-django
    K8S_CLUSTER_IMG: "235494822917.dkr.ecr.us-east-1.amazonaws.com/ssi/cluster-agent:7.56.2"
