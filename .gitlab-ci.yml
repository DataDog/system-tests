include:
  - remote: https://gitlab-templates.ddbuild.io/libdatadog/one-pipeline/ca/0b4d88122bb64a87131eeb9446a3671598790917ec30fc31851ccb6ee8375b8a/single-step-instrumentation-tests.yml
  - local: /utils/ci/gitlab/main.yml
    inputs:
      stage: "build"
      excluded_scenarios: "DEBUGGER_EXPRESSION_LANGUAGE,APM_TRACING_E2E_SINGLE_SPAN,APM_TRACING_E2E_OTEL,OTEL_COLLECTOR_E2E"
      ref: "$CI_COMMIT_SHA"
      push_to_test_optimization: true
stages:
  - configure
  - nodejs
  - java
  - dotnet
  - python
  - php
  - ruby
  - build
  - pipeline-status
  - system-tests-utils

variables:
    TEST: 1
    SKIP_RESOLVE_CI_IMAGE: "true"

