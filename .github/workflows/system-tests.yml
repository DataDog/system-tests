name: system-tests
on:
  workflow_call:
    inputs:
      library:
        description: "Library to test"
        required: true
        type: string
      ref:
        description: "system-tests ref to run the tests on (can be any valid branch, tag or SHA in system-tests repo)"
        type: string
      scenarios:
        description: "Comma-separated list scenarios to run"
        default: DEFAULT
        required: false
        type: string
      scenarios_groups:
        description: "Comma-separated list of scenarios groups to run"
        default: ''
        required: false
        type: string
      excluded_scenarios:
        description: "Comma-separated list of scenarios not to run"
        type: string
        default: ""
        required: false
      weblogs:
        description: "Comma-separated list of weblogs to run. By default, all weblogs are run"
        default: ''
        required: false
        type: string
      force_execute:
        description: "List of nodeid to force execute, separated by comma"
        required: false
        type: string
        default: ''
      binaries_artifact:
        description: "Artifact name containing the binaries to test"
        default: ''
        required: false
        type: string
      ci_environment:
        description: "**DEPRECATED**"
        default: 'custom'
        required: false
        type: string
      _build_weblog_base_images:
        description: "Shall we rebuild weblog base images"
        default: false
        required: false
        type: boolean
      _build_buddies_images:
        description: "Shall we build buddies images"
        default: false
        required: false
        type: boolean
      _build_proxy_image:
        description: "Shall we build proxy image"
        default: false
        required: false
        type: boolean
      _build_lambda_proxy_image:
        description: "Shall we build the lambda-proxy image"
        default: false
        required: false
        type: boolean
      skip_empty_scenarios:
        description: "Skip scenarios that contains only xfail or irrelevant tests"
        default: false
        required: false
        type: boolean
      parametric_job_count:
        description: "How many jobs should be used to run PARAMETRIC scenario"
        default: 1
        required: false
        type: number
      desired_execution_time:
        description: "In seconds, system-tests will try to respect this time budget."
        default: "-1"
        required: false
        type: string
      _enable_replay_scenarios:
        description: "Enable replay scenarios, should only used in system-tests CI"
        default: false
        required: false
        type: boolean
      _experimental_parametric_job_count:
        description: "*DEPRECATED*"
        default: 1
        required: false
        type: number
      _system_tests_dev_mode:
        description: "Shall we run system tests in dev mode (library and agent dev binary)"
        default: false
        required: false
        type: boolean
      _system_tests_library_target_branch_map:
        description: "If system-tests dev mode, JSON map of library to branch (e.g. {\"java\":\"b1\",\"dotnet\":\"b2\"})"
        default: ''
        required: false
        type: string
      artifact_retention_days:
        description: "Maximum retention of artifacts generated by upload-artifact action"
        default: 14
        required: false
        type: number
      push_to_test_optimization:
        description: "Push test result to DataDog Test Optimization"
        default: false
        required: false
        type: boolean
      test_optimization_datadog_site:
        description: "DataDog site to use for test optimization"
        default: "datadoghq.com"
        required: false
        type: string
      dd_sts_policy:
        description: "dd-sts policy to use to get a Datadog API key for Test Optimization"
        default: ""
        required: false
        type: string

    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      DD_API_KEY:
        required: false
      DD_APPLICATION_KEY:
        required: false
      DD_API_KEY_2:
        required: false
      DD_APP_KEY_2:
        required: false
      DD_API_KEY_3:
        required: false
      DD_APP_KEY_3:
        required: false

jobs:
  compute_parameters:
    name: Get parameters
    uses: ./.github/workflows/compute-workflow-parameters.yml
    with:
      library: ${{ inputs.library }}
      ref: ${{ inputs.ref }}
      scenarios: ${{ inputs.scenarios }}
      scenarios_groups: ${{ inputs.scenarios_groups }}
      excluded_scenarios: ${{ inputs.excluded_scenarios }}
      weblogs: ${{ inputs.weblogs }}
      parametric_job_count: ${{ inputs.parametric_job_count }}
      desired_execution_time: ${{ inputs.desired_execution_time }}
      binaries_artifact: ${{ inputs.binaries_artifact }}
      _system_tests_dev_mode: ${{ inputs._system_tests_dev_mode }}
      _system_tests_library_target_branch_map: ${{ inputs._system_tests_library_target_branch_map }}
      _build_weblog_base_images: ${{ inputs._build_weblog_base_images }}

  parametric:
    needs:
      - compute_parameters
    if: needs.compute_parameters.outputs.parametric_enable == 'true'
    uses: ./.github/workflows/run-parametric.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      library: ${{ inputs.library }}
      ref: ${{ inputs.ref }}
      binaries_artifact: ${{ needs.compute_parameters.outputs.binaries_artifact }}
      force_execute: ${{ inputs.force_execute }}
      ci_environment: ${{ needs.compute_parameters.outputs.ci_environment }}
      job_count: ${{ inputs.parametric_job_count }}
      job_matrix: ${{ needs.compute_parameters.outputs.parametric_job_matrix }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      unique_id: ${{ needs.compute_parameters.outputs.unique_id }}
      push_to_test_optimization: ${{ inputs.push_to_test_optimization }}
      test_optimization_datadog_site: ${{ inputs.test_optimization_datadog_site }}

  build_end_to_end:
    name: Build end-to-end (${{ matrix.weblog.name }})
    needs:
      - compute_parameters
    if: ${{ needs.compute_parameters.outputs.endtoend_defs_parallel_enable == 'true' && needs.compute_parameters.outputs.endtoend_defs_parallel_weblogs != '[]'}}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        weblog: ${{ fromJson(needs.compute_parameters.outputs.endtoend_defs_parallel_weblogs) }}
      fail-fast: false
    steps:
      - name: Compute ref
        id: compute_ref
        run: |
          if [[ "${{ inputs.ref }}" != "" ]]; then
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.repository }}" == "DataDog/system-tests" ]]; then
            echo "ref=" >> $GITHUB_OUTPUT
          else
            echo "ref=main" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          repository: 'DataDog/system-tests'
          ref: ${{ steps.compute_ref.outputs.ref }}
      - name: Get binaries artifact
        if : ${{ needs.compute_parameters.outputs.binaries_artifact != '' }}
        uses: ./.github/actions/download_artifact
        with:
          name: ${{ needs.compute_parameters.outputs.binaries_artifact }}
          path: binaries/
      - name: Log binaries contents
        if : ${{ needs.compute_parameters.outputs.binaries_artifact != '' }}
        run: ls -la binaries/
      - name: Build weblog base images
        if: matrix.weblog.build_base_image
        run: |
          source venv/bin/activate
          ./utils/script/build_base_image.py ${{ inputs.library }} ${{ matrix.weblog.name }}
      # TODO: Remove this token exchange after dd-iast-go becomes public.
      - name: Get temporary dd-iast-go read token
        id: dd_iast_go_token
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.number == 7342
          && inputs.library == 'golang'
          && matrix.weblog.name == 'net-http-orchestrion'
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/dd-iast-go
          policy: system-tests.github.read-contents.pr-7342
      - name: Build weblog
        id: build
        env:
          GITHUB_TOKEN: ${{ steps.dd_iast_go_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          TOKEN_FILE="$RUNNER_TEMP/github_token.txt"

          cleanup() {
            rm -f -- "$TOKEN_FILE"
          }

          trap cleanup EXIT
          trap 'exit 129' HUP
          trap 'exit 130' INT
          trap 'exit 143' TERM

          umask 077
          printf '%s' "$GITHUB_TOKEN" > "$TOKEN_FILE"

          SYSTEM_TEST_BUILD_ATTEMPTS=3 ./build.sh \
            ${{ inputs.library }} \
            -i weblog \
            -w ${{ matrix.weblog.name }} \
            -s \
            --github-token-file "$TOKEN_FILE"
      - name: Upload artifact
        uses: ./.github/actions/upload_artifact
        with:
          name: ${{ matrix.weblog.artifact_name }}
          path: binaries/
          retention-days: ${{ inputs.artifact_retention_days }}

  run_end_to_end:
    name: "End-to-end #${{ matrix.job.weblog_instance }}"
    needs:
      - compute_parameters
      - build_end_to_end
    if: ${{ needs.build_end_to_end.result != 'failure' && needs.compute_parameters.result != 'failure' && needs.compute_parameters.outputs.endtoend_defs_parallel_enable == 'true' && !cancelled() }}
    strategy:
      matrix:
        job: ${{ fromJson(needs.compute_parameters.outputs.endtoend_defs_parallel_jobs) }}
      fail-fast: false
    uses: ./.github/workflows/run-end-to-end.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      runs_on: ${{ matrix.job.runs_on }}
      library: ${{ matrix.job.library }}
      ref: ${{ inputs.ref }}
      weblog: ${{ matrix.job.weblog }}
      weblog_instance: ${{ matrix.job.weblog_instance }}
      weblog_build_required: ${{ matrix.job.weblog_build_required }}
      scenarios: ${{ toJson(matrix.job.scenarios) }}
      force_execute: ${{ inputs.force_execute }}
      binaries_artifact: ${{ matrix.job.binaries_artifact }}
      ci_environment: ${{ needs.compute_parameters.outputs.ci_environment }}
      skip_empty_scenarios: ${{ inputs.skip_empty_scenarios }}
      logs_artifact_name: logs_endtoend_${{ inputs.library }}_${{ matrix.job.weblog }}_${{ needs.compute_parameters.outputs.ci_environment }}_${{ matrix.job.weblog_instance }}_${{ needs.compute_parameters.outputs.unique_id }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      push_to_test_optimization: ${{ inputs.push_to_test_optimization }}
      test_optimization_datadog_site: ${{ inputs.test_optimization_datadog_site }}
      _build_buddies_images: ${{ inputs._build_buddies_images }}
      _build_proxy_image: ${{ inputs._build_proxy_image }}
      _build_lambda_proxy_image: ${{ inputs._build_lambda_proxy_image }}
      _build_weblog_base_image: ${{ matrix.job.build_weblog_base_image }}
      _enable_replay_scenarios: ${{ inputs._enable_replay_scenarios }}
      _system_tests_dev_mode: ${{ inputs._system_tests_dev_mode }}
