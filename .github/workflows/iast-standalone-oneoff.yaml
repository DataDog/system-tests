---
name: IAST standalone flake one-off
on:
  push:
    branches:
      - "florentin.labelle/iast-flask-flakiness-measurements"
permissions:
  contents: read
  packages: read
env:
  JOB_COUNT: "100"
  LIBRARY: python
  RUNS_PER_JOB: "10"
  SCENARIO: DEFAULT
  WEBLOG: uwsgi-poc
  DDPY_BRANCH: b1b15979fcf66cfc5bd3a73de61846315b6b5525
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.make.outputs.array }}
    steps:
      - id: make
        run: |
          seq -s, 1 "${{ env.JOB_COUNT }}" | awk '{print "[\"" $0 "\"]"}' | sed 's/,/","/g' > arr.json
          echo "array=$(cat arr.json)" >> "$GITHUB_OUTPUT"
  build-weblog:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Export github token to a file
        run: echo "${{ secrets.GITHUB_TOKEN }}" > "$RUNNER_TEMP/github_token.txt"
      - name: Load request binary
        run: echo ${{ env.DDPY_BRANCH }} > binaries/python-load-from-s3
      - name: Build base image
        run: ./utils/build/build_python_base_images.sh ${{ env.WEBLOG }}
      - name: Build ${{ env.WEBLOG }} weblog and save it to binaries
        run: |
          SYSTEM_TEST_BUILD_ATTEMPTS=3 ./build.sh \
            "${{ env.LIBRARY }}" \
            -i weblog \
            -w "${{ env.WEBLOG }}" \
            -s \
            --github-token-file "$RUNNER_TEMP/github_token.txt"
      - name: Remove secrets
        if: always()
        run: |
          TOKEN_FILE="$RUNNER_TEMP/github_token.txt"
          if [ -f "$TOKEN_FILE" ]; then
            rm -f "$TOKEN_FILE"
          fi
      - name: Upload weblog artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-${{ env.WEBLOG }}-weblog-${{ github.run_id }}
          path: binaries/python-${{ env.WEBLOG }}-weblog.tar.gz
          retention-days: 14
  run-iast-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - generate-matrix
      - build-weblog
    strategy:
      fail-fast: true
      max-parallel: 10
      matrix:
        n: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Install runner
        uses: ./.github/actions/install_runner
      - name: Download weblog artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-${{ env.WEBLOG }}-weblog-${{ github.run_id }}
          path: binaries/
      - name: Load weblog image from binaries
        run: ./build.sh "${{ env.LIBRARY }}" -i weblog -w "${{ env.WEBLOG }}"
      - name: Run IAST_STANDALONE up to ${{ env.RUNS_PER_JOB }} times
        id: run_iast
        run: |
          mkdir -p workflow-artifacts

          for attempt in $(seq 1 "${{ env.RUNS_PER_JOB }}"); do
            echo "::group::Runner ${{ matrix.n }} attempt ${attempt}"
            rm -rf logs

            if ./run.sh "${{ env.SCENARIO }}" tests/appsec/iast; then
              echo "Attempt ${attempt} passed"
            else
              DEST="workflow-artifacts/logs_iast_standalone_job_${{ matrix.n }}_attempt_${attempt}"
              mkdir -p "$DEST"

              if [ -d logs ]; then
                cp -R logs "$DEST/"
              fi

              echo "Attempt ${attempt} failed"
              echo "::endgroup::"
              exit 1
            fi

            echo "::endgroup::"
          done
      - name: Upload failing logs
        if: always() && steps.run_iast.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: logs_${{ matrix.n }}_${{ github.run_id }}
          path: workflow-artifacts/
          if-no-files-found: ignore
          retention-days: 14
