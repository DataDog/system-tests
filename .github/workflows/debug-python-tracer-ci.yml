name: "[Throwaway] Python tracer debug pipeline (unvalidated_redirect / flask-poc)"

# One-off, high-repetition debug pipeline for validating the fix for the flaky
# IAST UNVALIDATED_REDIRECT test_secure false positive on flask-poc.
#
# Goal: prove dd-trace-py main (with merged fix DataDog/dd-trace-py#18701,
#   "suppress IAST taint source generation during request analysis") no longer
#   flakes on flask-poc, contrasted against the pre-fix parent commit as a
#   red baseline on the SAME config.
#
# Refs:
#   main                                        -> validation (expect 100/100 green)
#   b6aac64b15af4548f45553a6f259db9bec5f1225    -> pre-fix baseline (parent of #18701 merge)
#
# Delete this file once the investigation is done.

on:
  push:
    branches:
      - florentin.labelle/fix-unvalidated-redirect-for-good
  workflow_dispatch:
    inputs:
      dd_trace_py_ref:
        description: "dd-trace-py branch / tag / SHA to clone into binaries/dd-trace-py and compile"
        default: "florentin.labelle/fix-unvalidated-redirect-for-good"
        required: true
        type: string
      weblog:
        description: "weblog variant"
        default: "flask-poc"
        required: true
        type: string
      scenario:
        description: "system-tests scenario"
        default: "DEFAULT"
        required: true
        type: string
      run_args:
        description: "extra args appended to run.sh (test selection / --deselect ...)"
        default: "tests/appsec/iast/sink/test_unvalidated_redirect.py"
        required: false
        type: string
      iast_debug:
        description: "add --force-dd-iast-debug"
        default: true
        required: false
        type: boolean
      runs_per_batch:
        description: "how many times each batch runs the scenario"
        default: "30"
        required: false
        type: string

env:
  DD_TRACE_PY_REF: ${{ github.event.inputs.dd_trace_py_ref || 'florentin.labelle/fix-unvalidated-redirect-for-good' }}
  WEBLOG: ${{ github.event.inputs.weblog || 'flask-poc' }}
  SCENARIO: ${{ github.event.inputs.scenario || 'DEFAULT' }}
  RUN_ARGS: ${{ github.event.inputs.run_args || 'tests/appsec/iast/sink/test_unvalidated_redirect.py' }}
  RUNS_PER_BATCH: ${{ github.event.inputs.runs_per_batch || '30' }}
  IAST_DEBUG: ${{ github.event.inputs.iast_debug }}

jobs:
  build:
    name: "Build weblog (${{ github.event.inputs.dd_trace_py_ref || 'main' }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout system-tests
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Install runner
        uses: ./.github/actions/install_runner

      - name: Fetch dd-trace-py source into binaries (compiled by build.sh)
        run: |
          rm -f binaries/python-load-from-s3
          # init+fetch+checkout instead of `git clone --branch` so a raw commit
          # SHA (the pre-fix baseline) works as well as a branch/tag name.
          mkdir -p binaries/dd-trace-py
          git -C binaries/dd-trace-py init -q
          git -C binaries/dd-trace-py remote add origin https://github.com/DataDog/dd-trace-py.git
          git -C binaries/dd-trace-py fetch -q --depth 1 origin "${{ env.DD_TRACE_PY_REF }}"
          git -C binaries/dd-trace-py checkout -q FETCH_HEAD
          git -C binaries/dd-trace-py submodule update --init --recursive --depth 1
          echo "Fetched dd-trace-py at: $(git -C binaries/dd-trace-py rev-parse HEAD)"
          # build.sh mounts binaries/ into the non-root testrunner container; Cython writes
          # generated .c into the source tree and the wheel into binaries/, so make it writable.
          chmod -R a+rwX binaries

      - name: Export GitHub token
        run: echo "${{ secrets.GITHUB_TOKEN }}" > "$RUNNER_TEMP/github_token.txt"

      - name: Build weblog image
        # DD_FAST_BUILD=1: fast source compile (debug build fine). Single attempt + 2400s:
        # a from-source compile exceeds the default 600s/attempt, and a timed-out attempt
        # leaves a truncated .tar.zst that build.sh would then *load* instead of rebuild.
        run: |
          DD_FAST_BUILD=1 SYSTEM_TEST_BUILD_ATTEMPTS=1 SYSTEM_TEST_BUILD_TIMEOUT=2400 \
            ./build.sh python -i weblog -w "${{ env.WEBLOG }}" -s --github-token-file "$RUNNER_TEMP/github_token.txt"

      - name: Remove secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/github_token.txt" || true

      - name: Upload weblog image tar
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: weblog-image
          path: binaries/python-${{ env.WEBLOG }}-weblog.tar.zst

  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.make.outputs.array }}
    steps:
      - id: make
        run: |
          seq -s, 1 10 | awk '{print "[\"" $0 "\"]"}' | sed 's/,/","/g' > arr.json
          echo "array=$(cat arr.json)" >> $GITHUB_OUTPUT

  test:
    name: "run (batch ${{ matrix.n }})"
    runs-on: ubuntu-latest
    needs: [build, generate-matrix]
    strategy:
      # fail-fast disabled for FIX VALIDATION: an infra flake (e.g. gunicorn worker boot
      # timeout under loaded runners) in one batch must not cancel the redirect signal in
      # the others. Each failing batch uploads its own logs for infra-vs-bug triage.
      fail-fast: false
      matrix:
        n: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout system-tests
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Install runner
        uses: ./.github/actions/install_runner

      - name: Download weblog image tar
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: weblog-image
          path: binaries/

      - name: Load weblog image
        run: zstd -d -c binaries/python-${{ env.WEBLOG }}-weblog.tar.zst | docker load

      - name: Run scenario ${{ env.RUNS_PER_BATCH }} times
        run: |
          set -e
          IAST_FLAG=""
          if [ "${{ env.IAST_DEBUG }}" = "true" ]; then IAST_FLAG="--force-dd-iast-debug"; fi
          for i in $(seq 1 "${{ env.RUNS_PER_BATCH }}"); do
            echo "────── batch ${{ matrix.n }} run $i/${{ env.RUNS_PER_BATCH }} ──────"
            ./run.sh "${{ env.SCENARIO }}" --force-dd-trace-debug $IAST_FLAG ${{ env.RUN_ARGS }}
          done

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: logs_batch_${{ matrix.n }}
          path: logs
