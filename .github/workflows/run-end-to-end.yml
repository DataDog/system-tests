name: End-to-end tests

on:
  workflow_call:
    inputs:
      runs_on:
        description: "Github runner"
        required: true
        type: string
      library:
        description: "Library to test"
        required: true
        type: string
      ref:
        description: "system-tests ref to run the tests on (can be any valid branch, tag or SHA in system-tests repo)"
        type: string
      scenarios:
        description: "JSON array of scenarios to run"
        default: "[]"
        required: false
        type: string
      weblog:
        description: "Weblog name"
        required: true
        type: string
      weblog_build_required:
        description: "Is ./build.sh required?"
        required: true
        type: boolean
      weblog_instance:
        description: "Weblog instance name, if several job runs the same weblog, usefull to distinguish them in UI"
        required: false
        type: string
        default: ''
      force_execute:
        description: "List of nodeid to force execute, separated by comma"
        required: false
        type: string
        default: ''
      binaries_artifact:
        description: "Artifact name containing the binaries to test"
        default: ''
        required: false
        type: string
      ci_environment:
        description: "Which CI environment is running the tests, used for FPD"
        default: 'custom'
        required: false
        type: string
      _build_python_base_images:
        description: "Shall we build python base images for tests on python tracer"
        default: false
        required: false
        type: boolean
      _build_buddies_images:
        description: "Shall we build buddies images"
        default: false
        required: false
        type: boolean
      _build_proxy_image:
        description: "Shall we build proxy image"
        default: false
        required: false
        type: boolean
      _build_lambda_proxy_image:
        description: "Shall we build the lambda-proxy image"
        default: false
        required: false
        type: boolean
      push_to_feature_parity_dashbaord:
        description: "Shall we push results to Feature Parity Dashbaord"
        default: false
        required: false
        type: boolean
      skip_empty_scenarios:
        description: "Skip scenarios that contains only xfail or irrelevant tests"
        default: false
        required: false
        type: boolean
      _enable_replay_scenarios:
        description: "Enable replay scenarios, should only used in system-tests CI"
        default: false
        required: false
        type: boolean
      logs_artifact_name:
        description: "The name of the artifact to use for logs"
        required: true
        type: string
      artifact_retention_days:
        description: "Maximum retention of artifacts generated by upload-artifact action"
        default: 14
        required: false
        type: number
      push_to_test_optimization:
        description: "Push test result to DataDog Test Optimization"
        default: false
        required: false
        type: boolean
      test_optimization_datadog_site:
        description: "DataDog site to use for test optimization"
        default: "datadoghq.com"
        required: false
        type: string
      _system_tests_dev_mode:
        description: "Shall we run system tests in dev mode (library and agent dev binary)"
        default: false
        required: false
        type: boolean

jobs:
  main:
    name: "${{ inputs.weblog }} ${{ inputs.weblog_instance }}"
    runs-on: ${{ inputs.runs_on }}
    env:
      SYSTEM_TESTS_REPORT_ENVIRONMENT: ${{ inputs.ci_environment }}
      SYSTEM_TESTS_REPORT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      SYSTEM_TESTS_SKIP_EMPTY_SCENARIO: ${{ inputs.skip_empty_scenarios }}
      SYSTEM_TESTS_FORCE_EXECUTE: ${{ inputs.force_execute }}
      SYSTEM_TESTS_DEV_MODE: ${{ inputs._system_tests_dev_mode }}
    steps:
      # Cleanup code from https://github.com/easimon/maximize-build-space
    - name: Disk space report before modification
      shell: bash
      run: |
        echo "Memory and swap:"
        sudo free -h
        echo
        sudo swapon --show
        echo

        echo "Available storage:"
        sudo df -h
        echo
    - name: Maximize build disk space
      shell: bash
      run: |
        set -euo pipefail

        # absolute file path for the LVM image created on the root filesystem
        PV_LOOP_PATH="/pv.img"

        # absolute file path for the LVM image created on the temp filesystem
        TMP_PV_LOOP_PATH="/mnt/tmp-pv.img"

        # store owner of $GITHUB_WORKSPACE in case the action deletes it
        WORKSPACE_OWNER="$(stat -c '%U:%G' "${GITHUB_WORKSPACE}")"

        # ensure mount path exists before the action
        sudo mkdir -p "${GITHUB_WORKSPACE}"
        sudo find "${GITHUB_WORKSPACE}" -maxdepth 0 ! -empty -exec echo 'WARNING: directory [{}] is not empty, data loss might occur. Content:' \; -exec ls -al "{}" \;

        # android not removed because it takes forever
        # docker cache not removed because we use Docker so it could be useful
        echo "Removing unwanted software... "
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        echo "... done"

        VG_NAME=buildvg

        # github runners have an active swap file in /mnt/swapfile
        # we want to reuse the temp disk, so first unmount swap and clean the temp disk
        echo "Unmounting and removing swap file."
        sudo swapoff -a
        sudo rm -f /mnt/swapfile

        echo "Creating LVM Volume."
        echo "  Creating LVM PV on root fs."
        # create loop pv image on root fs
        ROOT_RESERVE_KB=$(expr 1024 \* 1024)
        ROOT_FREE_KB=$(df --block-size=1024 --output=avail / | tail -1)
        ROOT_LVM_SIZE_KB=$(expr $ROOT_FREE_KB - $ROOT_RESERVE_KB)
        ROOT_LVM_SIZE_BYTES=$(expr $ROOT_LVM_SIZE_KB \* 1024)
        sudo touch "${PV_LOOP_PATH}" && sudo fallocate -z -l "${ROOT_LVM_SIZE_BYTES}" "${PV_LOOP_PATH}"
        export ROOT_LOOP_DEV=$(sudo losetup --find --show "${PV_LOOP_PATH}")
        sudo pvcreate -f "${ROOT_LOOP_DEV}"

        # create pv on temp disk
        echo "  Creating LVM PV on temp fs."
        TMP_RESERVE_KB=$(expr 100 \* 1024)
        TMP_FREE_KB=$(df --block-size=1024 --output=avail /mnt | tail -1)
        TMP_LVM_SIZE_KB=$(expr $TMP_FREE_KB - $TMP_RESERVE_KB)
        TMP_LVM_SIZE_BYTES=$(expr $TMP_LVM_SIZE_KB \* 1024)
        sudo touch "${TMP_PV_LOOP_PATH}" && sudo fallocate -z -l "${TMP_LVM_SIZE_BYTES}" "${TMP_PV_LOOP_PATH}"
        export TMP_LOOP_DEV=$(sudo losetup --find --show "${TMP_PV_LOOP_PATH}")
        sudo pvcreate -f "${TMP_LOOP_DEV}"

        # create volume group from these pvs
        sudo vgcreate "${VG_NAME}" "${TMP_LOOP_DEV}" "${ROOT_LOOP_DEV}"

        echo "Recreating swap"
        # create and activate swap
        sudo lvcreate -L "4096M" -n swap "${VG_NAME}"
        sudo mkswap "/dev/mapper/${VG_NAME}-swap"
        sudo swapon "/dev/mapper/${VG_NAME}-swap"

        echo "Creating build volume"
        # create and mount build volume
        sudo lvcreate -l 100%FREE -n buildlv "${VG_NAME}"
        sudo mkfs.ext4 -Enodiscard -m0 "/dev/mapper/${VG_NAME}-buildlv"
        sudo mount "/dev/mapper/${VG_NAME}-buildlv" "${GITHUB_WORKSPACE}"
        sudo chown -R "runner:runner" "${GITHUB_WORKSPACE}"

        # if build mount path is a parent of $GITHUB_WORKSPACE, and has been deleted, recreate it
        if [[ ! -d "${GITHUB_WORKSPACE}" ]]; then
          sudo mkdir -p "${GITHUB_WORKSPACE}"
          sudo chown -R "${WORKSPACE_OWNER}" "${GITHUB_WORKSPACE}"
        fi
    - name: Disk space report after modification
      shell: bash
      run: |
        echo "Memory and swap:"
        sudo free -h
        echo
        sudo swapon --show
        echo

        echo "Available storage:"
        sudo df -h
    - name: Compute ref
      id: compute_ref
      run: |
        if [[ "${{ inputs.ref }}" != "" ]]; then
          echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.repository }}" == "DataDog/system-tests" ]]; then
          echo "ref=" >> $GITHUB_OUTPUT
        else
          echo "ref=main" >> $GITHUB_OUTPUT
        fi
    - name: Checkout
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      with:
        repository: 'DataDog/system-tests'
        ref: ${{ steps.compute_ref.outputs.ref }}
    - name: Install runner
      uses: ./.github/actions/install_runner
    - name: Get binaries artifact
      if : ${{ inputs.binaries_artifact != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.binaries_artifact }}
        path: binaries/
    - name: Build python's weblog base images
      if: inputs.library == 'python' && inputs._build_python_base_images
      run: |
        ./utils/build/build_python_base_images.sh
    - name: Build buddies weblog images
      if: inputs._build_buddies_images
      run: ./utils/build/build_tracer_buddies.sh
    - name: Build proxy image
      if: inputs._build_proxy_image
      run: ./build.sh -i proxy
    - name: Build lambda-proxy image
      if: inputs._build_lambda_proxy_image
      run: ./build.sh -i lambda-proxy
    - name: Pull images
      uses: ./.github/actions/pull_images
      with:
        library: ${{ inputs.library }}
        weblog: ${{ inputs.weblog }}
        scenarios: ${{ inputs.scenarios }}
        dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
        dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Disk space report after pulling
      shell: bash
      run: |
        echo "Memory and swap:"
        sudo free -h
        echo
        sudo swapon --show
        echo

        echo "Available storage:"
        sudo df -h
    - name: Build weblog
      id: build
      run: |
        # If not required, skip but succeed so outcome == 'success'
        if [[ "${{ inputs.weblog_build_required }}" == 'false' ]]; then
          echo "Skipping build (weblog_build_required=false)"
          exit 0
        fi
        ./build.sh ${{ inputs.library }} -i weblog -w ${{ inputs.weblog }}
      env:
        SYSTEM_TEST_BUILD_ATTEMPTS: 3

    - name: Run INTEGRATION_FRAMEWORKS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"INTEGRATION_FRAMEWORKS"')
      run: ./run.sh INTEGRATION_FRAMEWORKS -L ${{ inputs.library }} --weblog ${{ inputs.weblog }}
    - name: Run APPSEC_STANDALONE scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_STANDALONE"')
      run: ./run.sh APPSEC_STANDALONE
    - name: Run APPSEC_APM_STANDALONE scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_APM_STANDALONE"')
      run: ./run.sh APPSEC_APM_STANDALONE
    - name: Run APPSEC_STANDALONE_APM_STANDALONE scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_STANDALONE_APM_STANDALONE"')
      run: ./run.sh APPSEC_STANDALONE_APM_STANDALONE
    - name: Run APPSEC_STANDALONE_API_SECURITY scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_STANDALONE_API_SECURITY"')
      run: ./run.sh APPSEC_STANDALONE_API_SECURITY
    - name: Run TRACE_STATS_COMPUTATION scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACE_STATS_COMPUTATION"')
      run: ./run.sh TRACE_STATS_COMPUTATION
    - name: Run IAST_STANDALONE scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"IAST_STANDALONE"')
      run: ./run.sh IAST_STANDALONE
    - name: Run SCA_STANDALONE scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"SCA_STANDALONE"')
      run: ./run.sh SCA_STANDALONE
    - name: Run RUNTIME_SCA_REACHABILITY scenario
      if: always() && steps.build.outcome == 'success' && contains(inputs.scenarios, '"RUNTIME_SCA_REACHABILITY"')
      run: ./run.sh RUNTIME_SCA_REACHABILITY
    - name: Run IAST_DEDUPLICATION scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"IAST_DEDUPLICATION"')
      run: ./run.sh IAST_DEDUPLICATION
    - name: Run DEFAULT scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"DEFAULT"')
      run: ./run.sh DEFAULT
    - name: Run GRAPHQL_APPSEC scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"GRAPHQL_APPSEC"')
      run: ./run.sh GRAPHQL_APPSEC
    - name: Run GRAPHQL_ERROR_TRACKING scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"GRAPHQL_ERROR_TRACKING"')
      run: ./run.sh GRAPHQL_ERROR_TRACKING
    - name: Run IPV6 scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"IPV6"')
      run: ./run.sh IPV6
    - name: Run CROSSED_TRACING_LIBRARIES scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"CROSSED_TRACING_LIBRARIES"')
      run: ./run.sh CROSSED_TRACING_LIBRARIES
    - name: Run PROFILING scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"PROFILING"')
      run: |
        cat /proc/sys/kernel/perf_event_paranoid
        sudo sysctl kernel.perf_event_paranoid=1
        sudo sysctl -p
        ./run.sh PROFILING
    - name: Run TRACE_PROPAGATION_STYLE_W3C scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACE_PROPAGATION_STYLE_W3C"')
      run: ./run.sh TRACE_PROPAGATION_STYLE_W3C
    - name: Run INTEGRATIONS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"INTEGRATIONS"')
      run: ./run.sh INTEGRATIONS
    - name: Run INTEGRATIONS_AWS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"INTEGRATIONS_AWS"')
      run: ./run.sh INTEGRATIONS_AWS
    - name: Run APM_TRACING_E2E_OTEL scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APM_TRACING_E2E_OTEL"')
      run: |
        [[ -z "$DD_API_KEY" ]] && echo "Skipping: DD_API_KEY is not set" && exit 0
        ./run.sh APM_TRACING_E2E_OTEL
      env:
        DD_API_KEY: ${{ secrets.DD_API_KEY }}
        DD_APPLICATION_KEY: ${{ secrets.DD_APPLICATION_KEY }}
        DD_APP_KEY: ${{ secrets.DD_APPLICATION_KEY }}
    - name: Run APM_TRACING_E2E_SINGLE_SPAN scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APM_TRACING_E2E_SINGLE_SPAN"')
      run: |
        [[ -z "$DD_API_KEY" ]] && echo "Skipping: DD_API_KEY is not set" && exit 0
        ./run.sh APM_TRACING_E2E_SINGLE_SPAN
      env:
        DD_API_KEY: ${{ secrets.DD_API_KEY }}
        DD_APP_KEY: ${{ secrets.DD_APPLICATION_KEY }}
    - name: Run APM_TRACING_OTLP scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APM_TRACING_OTLP"')
      run: ./run.sh APM_TRACING_OTLP
    - name: Run APM_TRACING_EFFICIENT_PAYLOAD scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APM_TRACING_EFFICIENT_PAYLOAD"')
      run: ./run.sh APM_TRACING_EFFICIENT_PAYLOAD
    - name: Run LIBRARY_CONF_CUSTOM_HEADER_TAGS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"LIBRARY_CONF_CUSTOM_HEADER_TAGS"')
      run: ./run.sh LIBRARY_CONF_CUSTOM_HEADER_TAGS
    - name: Run LIBRARY_CONF_CUSTOM_HEADER_TAGS_INVALID scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"LIBRARY_CONF_CUSTOM_HEADER_TAGS_INVALID"')
      run: ./run.sh LIBRARY_CONF_CUSTOM_HEADER_TAGS_INVALID
    - name: Run OTLP_RUNTIME_METRICS scenario
      if: always() && steps.build.outcome == 'success' && contains(inputs.scenarios, '"OTLP_RUNTIME_METRICS"')
      run: ./run.sh OTLP_RUNTIME_METRICS
    - name: Run RUNTIME_METRICS_ENABLED scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"RUNTIME_METRICS_ENABLED"')
      run: ./run.sh RUNTIME_METRICS_ENABLED
    - name: Run TRACING_CONFIG_EMPTY scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACING_CONFIG_EMPTY"')
      run: ./run.sh TRACING_CONFIG_EMPTY
    - name: Run TRACING_CONFIG_NONDEFAULT scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACING_CONFIG_NONDEFAULT"')
      run: ./run.sh TRACING_CONFIG_NONDEFAULT
    - name: Run TRACING_CONFIG_NONDEFAULT_2 scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACING_CONFIG_NONDEFAULT_2"')
      run: ./run.sh TRACING_CONFIG_NONDEFAULT_2
    - name: Run TRACING_CONFIG_NONDEFAULT_3 scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACING_CONFIG_NONDEFAULT_3"')
      run: ./run.sh TRACING_CONFIG_NONDEFAULT_3
    - name: Run TRACING_CONFIG_NONDEFAULT_4 scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"TRACING_CONFIG_NONDEFAULT_4"')
      run: ./run.sh TRACING_CONFIG_NONDEFAULT_4
    - name: Run REMOTE_CONFIG_MOCKED_BACKEND_ASM_FEATURES scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"REMOTE_CONFIG_MOCKED_BACKEND_ASM_FEATURES"')
      run: ./run.sh REMOTE_CONFIG_MOCKED_BACKEND_ASM_FEATURES
    - name: Run REMOTE_CONFIG_MOCKED_BACKEND_LIVE_DEBUGGING scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"REMOTE_CONFIG_MOCKED_BACKEND_LIVE_DEBUGGING"')
      run: ./run.sh REMOTE_CONFIG_MOCKED_BACKEND_LIVE_DEBUGGING
    - name: Run REMOTE_CONFIG_MOCKED_BACKEND_ASM_DD scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"REMOTE_CONFIG_MOCKED_BACKEND_ASM_DD"')
      run: ./run.sh REMOTE_CONFIG_MOCKED_BACKEND_ASM_DD
    - name: Run REMOTE_CONFIG_MOCKED_BACKEND_ASM_FEATURES_NOCACHE scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"REMOTE_CONFIG_MOCKED_BACKEND_ASM_FEATURES_NOCACHE"')
      run: ./run.sh REMOTE_CONFIG_MOCKED_BACKEND_ASM_FEATURES_NOCACHE
    - name: Run FEATURE_FLAGGING_AND_EXPERIMENTATION scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"FEATURE_FLAGGING_AND_EXPERIMENTATION"')
      run: ./run.sh FEATURE_FLAGGING_AND_EXPERIMENTATION
    - name: Run AGENT_SUPPORTING_SPAN_EVENTS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"AGENT_SUPPORTING_SPAN_EVENTS"')
      run: ./run.sh AGENT_SUPPORTING_SPAN_EVENTS
    - name: Run AGENT_NOT_SUPPORTING_SPAN_EVENTS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"AGENT_NOT_SUPPORTING_SPAN_EVENTS"')
      run: ./run.sh AGENT_NOT_SUPPORTING_SPAN_EVENTS
    - name: Run APPSEC_MISSING_RULES scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_MISSING_RULES"')
      run: ./run.sh APPSEC_MISSING_RULES
    - name: Run APPSEC_CUSTOM_RULES scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_CUSTOM_RULES"')
      run: ./run.sh APPSEC_CUSTOM_RULES
    - name: Run APPSEC_CORRUPTED_RULES scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_CORRUPTED_RULES"')
      run: ./run.sh APPSEC_CORRUPTED_RULES
    - name: Run APPSEC_RULES_MONITORING_WITH_ERRORS scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_RULES_MONITORING_WITH_ERRORS"')
      run: ./run.sh APPSEC_RULES_MONITORING_WITH_ERRORS
    - name: Run APPSEC_BLOCKING scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_BLOCKING"')
      run: ./run.sh APPSEC_BLOCKING
    - name: Run EVERYTHING_DISABLED scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"EVERYTHING_DISABLED"')
      run: ./run.sh EVERYTHING_DISABLED
    - name: Run APPSEC_LOW_WAF_TIMEOUT scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_LOW_WAF_TIMEOUT"')
      run: ./run.sh APPSEC_LOW_WAF_TIMEOUT
    - name: Run APPSEC_CUSTOM_OBFUSCATION scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_CUSTOM_OBFUSCATION"')
      run: ./run.sh APPSEC_CUSTOM_OBFUSCATION
    - name: Run APPSEC_RATE_LIMITER scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_RATE_LIMITER"')
      run: ./run.sh APPSEC_RATE_LIMITER
    - name: Run APPSEC_BLOCKING_FULL_DENYLIST scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_BLOCKING_FULL_DENYLIST"')
      run: ./run.sh APPSEC_BLOCKING_FULL_DENYLIST
    - name: Run APPSEC_RUNTIME_ACTIVATION scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_RUNTIME_ACTIVATION"')
      run: ./run.sh APPSEC_RUNTIME_ACTIVATION
    - name: Run APPSEC_WAF_TELEMETRY scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_WAF_TELEMETRY"')
      run: ./run.sh APPSEC_WAF_TELEMETRY
    - name: Run APPSEC_API_SECURITY scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_API_SECURITY"')
      run: ./run.sh APPSEC_API_SECURITY
    - name: Run APPSEC_API_SECURITY_RC scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_API_SECURITY_RC"')
      run: ./run.sh APPSEC_API_SECURITY_RC
    - name: Run APPSEC_API_SECURITY_NO_RESPONSE_BODY scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_API_SECURITY_NO_RESPONSE_BODY"')
      run: ./run.sh APPSEC_API_SECURITY_NO_RESPONSE_BODY
    - name: Run APPSEC_ATO_SDK scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_ATO_SDK"')
      run: ./run.sh APPSEC_ATO_SDK
    - name: Run APPSEC_API_SECURITY_WITH_SAMPLING scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_API_SECURITY_WITH_SAMPLING"')
      run: |
        ./run.sh APPSEC_API_SECURITY_WITH_SAMPLING
        cat ./logs_appsec_api_security_with_sampling/tests.log 2>/dev/null | grep "API SECURITY" || true
    - name: Run APPSEC_AUTO_EVENTS_EXTENDED scenario
      if: steps.build.outcome == 'success' && !cancelled() && contains(inputs.scenarios, '"APPSEC_AUTO_EVENTS_EXTENDED"')
