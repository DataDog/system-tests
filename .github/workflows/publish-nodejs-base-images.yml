name: Publish Node.js base images

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag to publish (e.g. PR number or release version)"
        required: true
        type: string

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        env:
          VERSION: ${{ inputs.version }}
        run: ./utils/build/build_nodejs_base_images.sh --push
