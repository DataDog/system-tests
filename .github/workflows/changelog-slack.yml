name: Changelog Slack Notification

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    environment: Changelog slack notification

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Send changelog to Slack
        run: |
          ./utils/scripts/slack/send_changelog.sh
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
