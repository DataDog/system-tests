name: Test activation

on:
  pull_request:
    branches:
    - '**'
    types:
    - opened
    - synchronize
    - reopened
  workflow_dispatch: {}
  schedule:
    - cron:  '00 06 * * 1'  # Weekly activation on Mondays at 6 AM UTC

jobs:
  weekly-activation:
    strategy:
      matrix:
        library:
          - cpp
          - cpp_httpd
          - dotnet
          - golang
          - java
          - nodejs
          - php
          - python
          - python_lambda
          - ruby
          - rust
        include:
          - library: cpp
            exclude_owners: ""
          - library: cpp_httpd
            exclude_owners: ""
          - library: dotnet
            exclude_owners: ""
          - library: golang
            exclude_owners: ""
          - library: java
            exclude_owners: ""
          - library: nodejs
            exclude_owners: ""
          - library: php
            exclude_owners: ""
          - library: python
            exclude_owners: ""
          - library: python_lambda
            exclude_owners: ""
          - library: ruby
            exclude_owners: ""
          - library: rust
            exclude_owners: ""
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install runner
        uses: ./.github/actions/install_runner

      - name: Run activation script
        run: |
          chmod +x utils/scripts/activate-easy-wins.sh
          source venv/bin/activate
          if [[ -n "${{ matrix.exclude_owners }}" ]]; then
            ./utils/scripts/activate-easy-wins.sh --libraries ${{ matrix.library }} --exclude ${{ matrix.exclude_owners }}
          else
            ./utils/scripts/activate-easy-wins.sh --libraries ${{ matrix.library }}
          fi

      - name: Create Pull Request
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b weekly-activation-${{ matrix.library }}-$(date +%Y%m%d)
            git add .
            git commit -m "Activate easy wins scenarios for ${{ matrix.library }}"
            git push origin weekly-activation-${{ matrix.library }}-$(date +%Y%m%d)
            gh pr create --title "Weekly activation of easy wins scenarios for ${{ matrix.library }}" --body "Automated activation of easy wins scenarios for ${{ matrix.library }}.

            🤖 Generated by weekly activation workflow"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

