spec:
  inputs:
    stage:
---

build_test_pipeline:
  image: registry.ddbuild.io/ci/libdatadog-build/system-tests:100425777
  tags:
    - arch:amd64
  stage: build
  script:
    - ./build.sh -i runner
    - source venv/bin/activate
    - pip install Jinja2
    - python3 utils/scripts/compute-workflow-parameters.py python --format json -g all --output params.json
    - cat params.json
    - python3 utils/scripts/ci_orchestrators/build_pipeline.py --stage $[[ inputs.stage ]] --params params.json > generated-pipeline.yml
  artifacts:
    paths:
      - generated-pipeline.yml

run_test_pipeline:
  stage: run
  needs:
    - job: build_test_pipeline
      artifacts: true
  trigger:
    include:
      - artifact: generated-pipeline.yml
        job: build_test_pipeline
    strategy: depend

