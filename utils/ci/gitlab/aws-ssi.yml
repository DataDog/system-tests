spec:
  inputs:
    stage:
      description: "CI stage for all jobs in this component"
    libraries:
      description: "Space-separated list of libraries to test (e.g. 'java python nodejs')"
      default: "java python nodejs"
    scenarios:
      description: "Comma-separated list of scenarios to run (all if empty)"
      default: ""
    scenarios_groups:
      description: "Comma-separated list of scenario groups to run (all if empty)"
      default: ""
    ssi_library_version:
      description: "DD_INSTALLER_LIBRARY_VERSION to inject into generated jobs (Docker/K8s SSI)"
      default: ""
    k8s_lib_init_img:
      description: "K8S_LIB_INIT_IMG to inject into generated libinjection jobs"
      default: ""
    ssi_injector_version:
      description: "DD_INSTALLER_INJECTOR_VERSION to inject into generated dockerssi jobs"
      default: ""

---

# AWS SSI pipeline — mirrors the end-to-end pattern:
#   compute_pipeline  →  generated-ssi-pipeline.yml  →  run_ssi_pipeline
# All Docker/K8s SSI scenarios run in main.yml instead.

include:
  - remote: https://gitlab-templates.ddbuild.io/libdatadog/one-pipeline/ca/9cf7d7609ff62e4723c9cbc061ca2a25345ce5d6055b9acad9a13dbf736261f0/single-step-instrumentation-tests.yml

compute_pipeline:
  image: registry.ddbuild.io/ci/libdatadog-build/system-tests:100425777
  tags: ["arch:amd64"]
  stage: $[[ inputs.stage ]]
  variables:
    CI_ENVIRONMENT: "prod"
  script:
    - |
      if [ -z "$SYSTEM_TESTS_SCENARIOS" ] && [ -z "$SYSTEM_TESTS_SCENARIOS_GROUPS" ]; then
        echo "❌ Both SYSTEM_TESTS_SCENARIOS and SYSTEM_TESTS_SCENARIOS_GROUPS are not defined. Computing changes..."
        SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
        source venv/bin/activate
        ./run.sh MOCK_THE_TEST --collect-only --scenario-report
        git clone https://github.com/DataDog/system-tests.git original
        git fetch --all
        git branch --track $CI_COMMIT_REF_NAME origin/$CI_COMMIT_REF_NAME || true
        git checkout $CI_COMMIT_REF_NAME
        BASE_COMMIT=$(git merge-base origin/main $CI_COMMIT_REF_NAME)
        echo "Branch was created from commit--> $BASE_COMMIT"
        git diff --name-only $BASE_COMMIT $CI_COMMIT_SHA >> modified_files.txt
        cat modified_files.txt
        python utils/scripts/compute_libraries_and_scenarios.py >> impacted_scenarios.txt
        cat impacted_scenarios.txt
        source impacted_scenarios.txt
      else
        echo "✅ SYSTEM_TESTS_SCENARIOS OR SYSTEM_TESTS_SCENARIOS_GROUPS are set."
        export scenarios=$SYSTEM_TESTS_SCENARIOS
        export scenarios_groups=$SYSTEM_TESTS_SCENARIOS_GROUPS
        cd /system-tests
        git pull
        if [ -n "$SYSTEM_TESTS_REF" ]; then
          git checkout $SYSTEM_TESTS_REF
        else
          echo "⚠️  SYSTEM_TESTS_REF variable is not set, skipping git checkout"
        fi
        SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
        source venv/bin/activate
      fi
    - |
      [ -n "$[[ inputs.scenarios ]]" ] && scenarios="$[[ inputs.scenarios ]]"
      [ -n "$[[ inputs.scenarios_groups ]]" ] && scenarios_groups="$[[ inputs.scenarios_groups ]]"
      [ -n "$[[ inputs.ssi_library_version ]]" ] && export DD_INSTALLER_LIBRARY_VERSION="$[[ inputs.ssi_library_version ]]"
      [ -n "$[[ inputs.k8s_lib_init_img ]]" ] && export K8S_LIB_INIT_IMG="$[[ inputs.k8s_lib_init_img ]]"
      [ -n "$[[ inputs.ssi_injector_version ]]" ] && export DD_INSTALLER_INJECTOR_VERSION="$[[ inputs.ssi_injector_version ]]"
      for library in $[[ inputs.libraries ]]; do
        python utils/scripts/compute-workflow-parameters.py $library -s "$scenarios" -g "$scenarios_groups" --parametric-job-count 1 --ci-environment "${CI_ENVIRONMENT}" --format gitlab
      done
      python3 utils/ci/gitlab/build_ssi_pipeline.py $[[ inputs.libraries ]]
    - |
      if [ -n "$SYSTEM_TESTS_SCENARIOS" ] || [ -n "$SYSTEM_TESTS_SCENARIOS_GROUPS" ]; then
        cp *.yml "$CI_PROJECT_DIR"
      fi
  rules:
    - if: '$SCHEDULED_JOB == ""'
    - if: '$SCHEDULED_JOB == null'
  artifacts:
    paths:
      - generated-ssi-pipeline.yml

run_ssi_pipeline:
  interruptible: true
  stage: $[[ inputs.stage ]]
  needs:
    - job: compute_pipeline
      artifacts: true
  variables:
    PARENT_PIPELINE_SOURCE: $CI_PIPELINE_SOURCE
  trigger:
    include:
      - artifact: generated-ssi-pipeline.yml
        job: compute_pipeline
    strategy: depend
  rules:
    - if: '$SCHEDULED_JOB == ""'
    - if: '$SCHEDULED_JOB == null'
  when: always

delete_amis:
  extends: .base_job_onboarding
  stage: $[[ inputs.stage ]]
  allow_failure: false
  variables:
    AMI_RETENTION_DAYS: 10
    AMI_LAST_LAUNCHED_DAYS: 10
  script:
    - SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
    - source venv/bin/activate
    - python utils/scripts/pulumi_clean_up.py --component amis --ami-retention-days $AMI_RETENTION_DAYS --ami-last-launched-days $AMI_LAST_LAUNCHED_DAYS
  rules:
    - if: '$SCHEDULED_JOB == "delete_amis"'
  after_script: echo "Finish"
  timeout: 3h

delete_amis_by_name_or_lang:
  extends: .base_job_onboarding
  stage: $[[ inputs.stage ]]
  allow_failure: false
  script:
    - |
      if [ -z "$AMI_NAME" ] && [ -z "$AMI_LANG" ]; then
        echo "❌ ERROR: Either AMI_NAME or AMI_LANG must be set."
        exit 1
      fi
      echo "✅ Proceeding with AMI_NAME=$AMI_NAME, AMI_LANG=$AMI_LANG"
    - SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
    - source venv/bin/activate
    - |
      CMD="python utils/scripts/pulumi_clean_up.py --component amis_by_name"
      if [ -n "$AMI_NAME" ]; then CMD="$CMD --ami-name $AMI_NAME"; fi
      if [ -n "$AMI_LANG" ]; then CMD="$CMD --ami-lang $AMI_LANG"; fi
      echo "Running: $CMD"
      eval $CMD
  rules:
    - if: '$SCHEDULED_JOB == "delete_amis_by_name_or_lang"'
  after_script: echo "Finish"

delete_ec2_instances:
  extends: .base_job_onboarding
  stage: $[[ inputs.stage ]]
  allow_failure: false
  variables:
    EC2_AGE_MINUTES: 45
  script:
    - SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
    - source venv/bin/activate
    - python utils/scripts/pulumi_clean_up.py --component ec2 --ec2-age-minutes $EC2_AGE_MINUTES
  rules:
    - if: '$SCHEDULED_JOB == "delete_ec2_instances"'
  after_script: echo "Finish"

count_amis:
  extends: .base_job_onboarding
  stage: $[[ inputs.stage ]]
  allow_failure: false
  script:
    - SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
    - source venv/bin/activate
    - python utils/scripts/pulumi_clean_up.py --component amis_count
  rules:
    - if: '$SCHEDULED_JOB == "count_amis"'
  after_script: echo "Finish"

.delayed_base_job:
  image: registry.ddbuild.io/ci/libdatadog-build/ci_docker_base:100425777
  tags: ["arch:amd64"]
  script:
    - echo "⏳ Waiting before triggering the child pipeline..."
  when: delayed
  start_in: 5 minutes
