{% for variant in weblog_variants %}
build_{{library}}_{{variant}}:
  image: {{ci_image}}
  interruptible: true
  tags:
    - docker-in-docker:amd64
  stage: {{stage}}
  {% if binaries_artifact %}
  needs:
    - job: {{binaries_artifact}}
      artifacts: true
  {% endif %}
  variables:
    WEBLOG_VARIANT: {{variant}}
  script:
    - echo -e "\e[0Ksection_start:$(date +%s):build\r\e[0KBuilding {{library}} weblog {{variant}}"
    - ./build.sh {{library}} -i weblog --save-to-binaries
    - echo -e "\e[0Ksection_end:$(date +%s):build\r\e[0K"
  artifacts:
    paths:
      - binaries/
  before_script:
    - |
      if [ "$CI_PROJECT_NAME" != "system-tests" ]; then
        git clone --depth 1 {% if ref %}--branch "{{ref}}" {% endif %}https://github.com/DataDog/system-tests.git /tmp/system-tests
        cp -a /tmp/system-tests/. $CI_PROJECT_DIR/
      fi
    - export DOCKER_LOGIN=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-write --with-decryption --query "Parameter.Value" --out text)
    - export DOCKER_LOGIN_PASS=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-pass-write --with-decryption --query "Parameter.Value" --out text)
    - echo "$DOCKER_LOGIN_PASS" | docker login --username "$DOCKER_LOGIN" --password-stdin
    - ln -sf /system-tests/venv venv
    - export PYTHONPATH=$CI_PROJECT_DIR

{% endfor %}
{% for scenario in scenarios %}{% for variant in weblog_variants %}
run_{{library}}_{{scenario}}_{{variant}}:
  image: {{ci_image}}
  interruptible: true
  tags:
    - docker-in-docker:amd64
  stage: {{stage}}
  needs:
    - job: build_{{library}}_{{variant}}
      artifacts: true
  variables:
    WEBLOG_VARIANT: {{variant}}
  script:
    - echo -e "\e[0Ksection_start:$(date +%s):build\r\e[0KBuilding {{library}} weblog {{variant}}"
    - ./build.sh {{library}} -i weblog
    - echo -e "\e[0Ksection_end:$(date +%s):build\r\e[0K"
    - echo -e "\e[0Ksection_start:$(date +%s):run\r\e[0KRunning {{scenario}}"
    - ./run.sh {{scenario}}
    - echo -e "\e[0Ksection_end:$(date +%s):run\r\e[0K"
  artifacts:
    when: always
    paths:
      - logs*/reportJunit.xml
  before_script:
    - |
      if [ "$CI_PROJECT_NAME" != "system-tests" ]; then
        git clone --depth 1 {% if ref %}--branch "{{ref}}" {% endif %}https://github.com/DataDog/system-tests.git /tmp/system-tests
        cp -a /tmp/system-tests/. $CI_PROJECT_DIR/
      fi
    - export DOCKER_LOGIN=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-write --with-decryption --query "Parameter.Value" --out text)
    - export DOCKER_LOGIN_PASS=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-pass-write --with-decryption --query "Parameter.Value" --out text)
    - echo "$DOCKER_LOGIN_PASS" | docker login --username "$DOCKER_LOGIN" --password-stdin
    - ln -sf /system-tests/venv venv
    - export PYTHONPATH=$CI_PROJECT_DIR

{% endfor %}{% endfor %}
{% if parametric.enable %}
{% for job_index in parametric.job_matrix %}
run_{{library}}_PARAMETRIC_{{job_index}}:
  image: {{ci_image}}
  interruptible: true
  tags:
    - docker-in-docker:amd64
  stage: {{stage}}
  {% if binaries_artifact %}
  needs:
    - job: {{binaries_artifact}}
      artifacts: true
  {% endif %}
  script:
    - echo -e "\e[0Ksection_start:$(date +%s):run\r\e[0KRunning PARAMETRIC (group {{job_index}}/{{parametric.job_count}})"
    - ./run.sh PARAMETRIC -L {{library}} --splits={{parametric.job_count}} --group={{job_index}}
    - echo -e "\e[0Ksection_end:$(date +%s):run\r\e[0K"
  artifacts:
    when: always
    paths:
      - logs*/reportJunit.xml
  before_script:
    - |
      if [ "$CI_PROJECT_NAME" != "system-tests" ]; then
        git clone --depth 1 {% if ref %}--branch "{{ref}}" {% endif %}https://github.com/DataDog/system-tests.git /tmp/system-tests
        cp -a /tmp/system-tests/. $CI_PROJECT_DIR/
      fi
    - export DOCKER_LOGIN=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-write --with-decryption --query "Parameter.Value" --out text)
    - export DOCKER_LOGIN_PASS=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-pass-write --with-decryption --query "Parameter.Value" --out text)
    - echo "$DOCKER_LOGIN_PASS" | docker login --username "$DOCKER_LOGIN" --password-stdin
    - ln -sf /system-tests/venv venv
    - source venv/bin/activate
    - export PYTHONPATH=$CI_PROJECT_DIR

{% endfor %}
{% endif %}
{% if push_to_test_optimization %}
push_{{library}}_test_optimization:
  image: {{ci_image}}
  tags:
    - docker-in-docker:amd64
  stage: {{stage}}
  when: always
  needs:
    {% for scenario in scenarios %}{% for variant in weblog_variants %}
    - job: run_{{library}}_{{scenario}}_{{variant}}
      artifacts: true
    {% endfor %}{% endfor %}
    {% if parametric.enable %}{% for job_index in parametric.job_matrix %}
    - job: run_{{library}}_PARAMETRIC_{{job_index}}
      artifacts: true
    {% endfor %}{% endif %}
  script:
    - npm install -g @datadog/datadog-ci
    - >
      datadog-ci junit upload logs*/reportJunit.xml
      --service system-tests
      --env ci
      --xpath-tag "test.codeowners=/testcase/properties/property[@name='test.codeowners']"
  variables:
    DATADOG_SITE: {{test_optimization_datadog_site}}
    DATADOG_API_KEY: "$TEST_OPTIMIZATION_API_KEY"
{% endif %}
