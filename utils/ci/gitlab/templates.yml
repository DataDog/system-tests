spec:
  inputs:
    stage:
    ref:
      default: main

---

.system_tests_base:
  image: $CI_IMAGE
  tags:
    - docker-in-docker:amd64
  variables:
    GIT_STRATEGY: none
  stage: $[[ inputs.stage ]]
  interruptible: true
  before_script:
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.ddbuild.io/DataDog/system-tests.git
    - cd system-tests
    - git checkout $[[ inputs.ref ]]
    - ln -sf /system-tests/venv venv
    - source venv/bin/activate
    - export PYTHONPATH="$CI_PROJECT_DIR/system-tests"
