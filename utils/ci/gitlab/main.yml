---
spec:
  inputs:
    stage:
      description: "CI stage for all jobs in this component and the generated child pipeline"
    libraries:
      default: ""
    scenarios:
      description: "Comma-separated list of scenarios to run"
      default: ""
    scenarios_groups:
      description: "Comma-separated list of scenario groups to run"
      default: ""
    excluded_scenarios:
      description: "Comma-separated list of scenarios not to run"
      default: "APM_TRACING_E2E_OTEL,APM_TRACING_E2E_SINGLE_SPAN,OTEL_TRACING_E2E,OTEL_METRIC_E2E,OTEL_LOG_E2E,INTEGRATION_FRAMEWORKS"
    weblogs:
      description: "Comma-separated list of weblogs to run (all weblogs if empty)"
      default: ""
    binaries_artifact:
      description: "Name of the single upstream job to wait for before triggering the child pipeline (used as the timing gate)"
      default: "__no_binaries_artifact__"
    binaries_artifacts:
      description: "Semicolon-separated list of upstream jobs whose artifacts contain the pre-built binaries (downloaded by the generated build/run jobs via cross-pipeline needs). Use ';' not ',' because job names may contain commas (e.g. parallel matrix names)."
      default: ""
    binaries_artifact_path:
      description: "Path (relative to CI_PROJECT_DIR) of the binaries_artifact contents, copied into binaries/ before building/running"
      default: ""
    force_execute:
      description: "Comma-separated test node IDs to force-execute"
      default: ""
    skip_empty_scenarios:
      description: "Skip scenarios that contain only xfail or irrelevant tests"
      type: boolean
      default: false
    parametric_job_count:
      description: "Number of parallel jobs for the PARAMETRIC scenario"
      type: number
      default: 1
    push_to_test_optimization:
      description: "Push test results to Datadog Test Optimization"
      type: boolean
      default: false
    auto_cancel_on_new_commit:
      description: "Auto-cancel strategy when a new commit is pushed (interruptible, conservative, disabled)"
      default: "interruptible"
    ref:
      description: "system-tests ref to use when called from another repository (branch, tag or SHA)"
      default: "main"
    ssi_enabled:
      description: "Whether to run SSI tests"
      default: false
    ssi_library_version:
      description: "DD_INSTALLER_LIBRARY_VERSION to inject into generated jobs (Docker/K8s SSI)"
      default: ""
    k8s_lib_init_img:
      description: "K8S_LIB_INIT_IMG to inject into generated libinjection jobs"
      default: ""
    ssi_injector_version:
      description: "DD_INSTALLER_INJECTOR_VERSION to inject into generated dockerssi jobs"
      default: ""
    docker_auth:
      description: "Whether to authenticate calls to docker hub"
      default: "false"

---

include:
  - project: 'DataDog/system-tests'
    ref: $[[ inputs.ref ]]
    file: 'utils/ci/gitlab/templates.yml'
    inputs:
      stage: $[[ inputs.stage ]]
      ref: $[[ inputs.ref ]]
  - project: 'DataDog/system-tests'
    ref: $[[ inputs.ref ]]
    file: 'utils/ci/gitlab/ssi.yml'
    if: $[[ inputs.ssi_enabled ]]
    inputs:
      stage: $[[ inputs.stage ]]
      libraries: $[[ inputs.libraries ]]
      scenarios: $[[ inputs.scenarios ]]
      scenarios_groups: $[[ inputs.scenarios_groups ]]
      ssi_library_version: $[[ inputs.ssi_library_version ]]
      k8s_lib_init_img: $[[ inputs.k8s_lib_init_img ]]
      ssi_injector_version: $[[ inputs.ssi_injector_version ]]

workflow:
  rules:
    - when: always
      auto_cancel:
        on_new_commit: $[[ inputs.auto_cancel_on_new_commit ]]

variables:
  # Tag = first 12 chars of sha256(utils/ci/gitlab/docker/system-tests.Dockerfile + requirements.txt)
  # Update this when either file changes:
  #   cat utils/ci/gitlab/docker/system-tests.Dockerfile requirements.txt | sha256sum | cut -c1-12
  CI_IMAGE: "registry.ddbuild.io/system-tests/ci-runner:6bf5fa49e86c"

build_test_pipeline:
  extends: .system_tests_base
  tags:
    - arch:amd64
  needs:
    - job: build_ci_image
      optional: true
      artifacts: false
    - job: system-tests-param
      optional: true
      artifacts: true
  script:
    - |
      libraries=$(echo "$[[ inputs.libraries ]],$LIBRARIES" | tr ',' ' ' | xargs)
      scenarios=$(echo "$[[ inputs.scenarios ]],$SCENARIOS" | tr ',' '\n' | sed '/^$/d' | tr '\n' ',' | sed 's/,$//')
      scenario_groups=$(echo "$[[ inputs.scenarios_groups ]],$SCENARIO_GROUPS" | tr ',' '\n' | sed '/^$/d' | tr '\n' ',' | sed 's/,$//')
      weblogs=$(echo "$[[ inputs.weblogs ]]" | tr ',' '\n' | sed '/^$/d' | tr '\n' ',' | sed 's/,$//')
      echo "libraries:       $libraries"
      echo "scenarios:       $scenarios"
      echo "scenario_groups: $scenario_groups"
      echo "weblogs:         $weblogs"
      binaries_artifact="$[[ inputs.binaries_artifact ]]"
      [ "$binaries_artifact" = "__no_binaries_artifact__" ] && binaries_artifact=""
      for library in $libraries; do
        python3 utils/scripts/compute-workflow-parameters.py $library --format json --groups "$scenario_groups" --excluded-scenarios "$[[ inputs.excluded_scenarios ]]" --scenarios "$scenarios" --weblogs "$weblogs" --explicit-binaries-artifact "$binaries_artifact" --parametric-job-count $[[ inputs.parametric_job_count ]] --output params_${library}.json
      done
      python3 utils/ci/gitlab/build_pipeline.py --stage $[[ inputs.stage ]] --ci-image "$CI_IMAGE" --ref "$[[ inputs.ref ]]" --push-to-test-optimization "$[[ inputs.push_to_test_optimization ]]" --libraries "$libraries" --params-dir . --output-dir . --chunks 3 --docker-auth "$[[ inputs.docker_auth ]]" --binaries-artifact-path "$[[ inputs.binaries_artifact_path ]]" --binaries-artifacts "$[[ inputs.binaries_artifacts ]]"
  artifacts:
    paths:
      - system-tests/generated-pipeline-chunk-*.yml

.run_test_pipeline_base:
  interruptible: true
  stage: $[[ inputs.stage ]]
  rules:
    - if: '"$[[ inputs.libraries ]],$LIBRARIES" =~ /\w/'
    - when: never
  needs:
    - job: build_test_pipeline
      optional: true
      artifacts: true
    - job: system-tests-param
      optional: true
      artifacts: true
    - job: mirror_images
      optional: true
      artifacts: false
    - job: $[[ inputs.binaries_artifact ]]
      optional: true
      artifacts: false
  variables:
    SYSTEM_TESTS_FORCE_EXECUTE: "$[[ inputs.force_execute ]]"
    SYSTEM_TESTS_SKIP_EMPTY_SCENARIO: "$[[ inputs.skip_empty_scenarios ]]"
    LIBRARIES: $LIBRARIES
    UPSTREAM_PIPELINE_ID: $CI_PIPELINE_ID

run_test_pipeline_0:
  extends: .run_test_pipeline_base
  trigger:
    include:
      - artifact: system-tests/generated-pipeline-chunk-0.yml
        job: build_test_pipeline
    strategy: depend

run_test_pipeline_1:
  extends: .run_test_pipeline_base
  trigger:
    include:
      - artifact: system-tests/generated-pipeline-chunk-1.yml
        job: build_test_pipeline
    strategy: depend

run_test_pipeline_2:
  extends: .run_test_pipeline_base
  trigger:
    include:
      - artifact: system-tests/generated-pipeline-chunk-2.yml
        job: build_test_pipeline
    strategy: depend
