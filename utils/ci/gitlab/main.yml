spec:
  inputs:
    stage:
    libraries:
      default: "java python nodejs"
    scenarios:
      description: "Comma-separated list of scenarios to run"
      default: ""
    scenarios_groups:
      description: "Comma-separated list of scenario groups to run"
      default: ""
    excluded_scenarios:
      description: "Comma-separated list of scenarios not to run"
      default: "APM_TRACING_E2E_OTEL,APM_TRACING_E2E_SINGLE_SPAN,OTEL_TRACING_E2E,OTEL_METRIC_E2E,OTEL_LOG_E2E,INTEGRATION_FRAMEWORKS"
    weblogs:
      description: "Comma-separated list of weblogs to run (all weblogs if empty)"
      default: ""
    binaries_artifact:
      description: "Name of the upstream job whose artifacts contain the pre-built binaries to test"
      default: ""
    force_execute:
      description: "Comma-separated test node IDs to force-execute"
      default: ""
    skip_empty_scenarios:
      description: "Skip scenarios that contain only xfail or irrelevant tests"
      type: boolean
      default: false
    parametric_job_count:
      description: "Number of parallel jobs for the PARAMETRIC scenario"
      type: number
      default: 1
    push_to_test_optimization:
      description: "Push test results to Datadog Test Optimization"
      type: boolean
      default: false
    test_optimization_datadog_site:
      description: "Datadog site to use for Test Optimization"
      default: "datadoghq.com"
    auto_cancel_on_new_commit:
      description: "Auto-cancel strategy when a new commit is pushed (interruptible, conservative, disabled)"
      default: "interruptible"
---

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: always
      auto_cancel:
        on_new_commit: $[[ inputs.auto_cancel_on_new_commit ]]

build_ci_image:
  image: registry.ddbuild.io/images/docker:20.10.13-jammy
  interruptible: true
  tags:
    - docker-in-docker:amd64
  stage: $[[ inputs.stage ]]
  script:
    - IMAGE_TAG=$(cat utils/ci/gitlab/docker/system-tests.Dockerfile requirements.txt | sha256sum | cut -c1-12)
    - echo "CI_IMAGE=registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG" >> build.env
    - >
      if docker manifest inspect registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG > /dev/null 2>&1; then
        echo "Image already exists, skipping build";
      else
        docker build -f utils/ci/gitlab/docker/system-tests.Dockerfile -t registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG . &&
        docker push registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG;
      fi
  artifacts:
    reports:
      dotenv: build.env
  before_script:
    - export DOCKER_LOGIN=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-write --with-decryption --query "Parameter.Value" --out text)
    - export DOCKER_LOGIN_PASS=$(aws ssm get-parameter --region us-east-1 --name ci.system-tests.docker-login-pass-write --with-decryption --query "Parameter.Value" --out text)
    - echo "$DOCKER_LOGIN_PASS" | docker login --username "$DOCKER_LOGIN" --password-stdin

build_test_pipeline:
  image: $CI_IMAGE
  interruptible: true
  tags:
    - arch:amd64
  stage: $[[ inputs.stage ]]
  needs:
    - job: build_ci_image
      artifacts: true
  script:
    - >
      for library in $[[ inputs.libraries ]]; do
        python3 utils/scripts/compute-workflow-parameters.py $library --format json --groups "$[[ inputs.scenarios_groups ]]" --excluded-scenarios "$[[ inputs.excluded_scenarios ]]" --scenarios "$[[ inputs.scenarios ]]" --weblogs "$[[ inputs.weblogs ]]" --explicit-binaries-artifact "$[[ inputs.binaries_artifact ]]" --parametric-job-count $[[ inputs.parametric_job_count ]] --output params_${library}.json;
        python3 utils/ci/gitlab/build_pipeline.py --stage $[[ inputs.stage ]] --library $library --params params_${library}.json --ci-image "$CI_IMAGE" --push-to-test-optimization "$[[ inputs.push_to_test_optimization ]]" --test-optimization-datadog-site "$[[ inputs.test_optimization_datadog_site ]]" >> generated-pipeline.yml;
      done
  artifacts:
    paths:
      - generated-pipeline.yml
  before_script:
    - ln -sf /system-tests/venv venv
    - source venv/bin/activate
    - export PYTHONPATH=$CI_PROJECT_DIR

run_test_pipeline:
  interruptible: true
  stage: run
  needs:
    - job: build_test_pipeline
      artifacts: true
  variables:
    SYSTEM_TESTS_FORCE_EXECUTE: "$[[ inputs.force_execute ]]"
    SYSTEM_TESTS_SKIP_EMPTY_SCENARIO: "$[[ inputs.skip_empty_scenarios ]]"
  trigger:
    include:
      - artifact: generated-pipeline.yml
        job: build_test_pipeline
    strategy: depend

