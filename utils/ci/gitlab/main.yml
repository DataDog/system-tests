spec:
  inputs:
    stage:
    libraries:
      default: "java python nodejs"
    scenarios:
      description: "Comma-separated list of scenarios to run"
      default: ""
    scenarios_groups:
      description: "Comma-separated list of scenario groups to run"
      default: "all"
    excluded_scenarios:
      description: "Comma-separated list of scenarios not to run"
      default: "APM_TRACING_E2E_OTEL,APM_TRACING_E2E_SINGLE_SPAN,OTEL_TRACING_E2E,OTEL_METRIC_E2E,OTEL_LOG_E2E,INTEGRATION_FRAMEWORKS"
    weblogs:
      description: "Comma-separated list of weblogs to run (all weblogs if empty)"
      default: ""
    binaries_artifact:
      description: "Name of the upstream job whose artifacts contain the pre-built binaries to test"
      default: ""
    force_execute:
      description: "Comma-separated test node IDs to force-execute"
      default: ""
    skip_empty_scenarios:
      description: "Skip scenarios that contain only xfail or irrelevant tests"
      type: boolean
      default: false
---

build_test_pipeline:
  image: registry.ddbuild.io/ci/libdatadog-build/system-tests:100425777
  tags:
    - arch:amd64
  stage: build
  script:
    - ./build.sh -i runner
    - source venv/bin/activate
    - pip install Jinja2
    - >
      for library in $[[ inputs.libraries ]]; do
        python3 utils/scripts/compute-workflow-parameters.py $library --format json --groups "$[[ inputs.scenarios_groups ]]" --excluded-scenarios "$[[ inputs.excluded_scenarios ]]" --scenarios "$[[ inputs.scenarios ]]" --weblogs "$[[ inputs.weblogs ]]" --explicit-binaries-artifact "$[[ inputs.binaries_artifact ]]" --output params_${library}.json;
        python3 utils/ci/gitlab/build_pipeline.py --stage $[[ inputs.stage ]] --library $library --params params_${library}.json >> generated-pipeline.yml;
      done
  artifacts:
    paths:
      - generated-pipeline.yml

run_test_pipeline:
  stage: run
  needs:
    - job: build_test_pipeline
      artifacts: true
  variables:
    SYSTEM_TESTS_FORCE_EXECUTE: "$[[ inputs.force_execute ]]"
    SYSTEM_TESTS_SKIP_EMPTY_SCENARIO: "$[[ inputs.skip_empty_scenarios ]]"
  trigger:
    include:
      - artifact: generated-pipeline.yml
        job: build_test_pipeline
    strategy: depend

