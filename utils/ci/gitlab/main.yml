spec:
  inputs:
    stage:
      description: "CI stage for all jobs in this component and the generated child pipeline"
    libraries:
      default: ""
    scenarios:
      description: "Comma-separated list of scenarios to run"
      default: ""
    scenarios_groups:
      description: "Comma-separated list of scenario groups to run"
      default: "all"
    excluded_scenarios:
      description: "Comma-separated list of scenarios not to run"
      default: "APM_TRACING_E2E_OTEL,APM_TRACING_E2E_SINGLE_SPAN,OTEL_TRACING_E2E,OTEL_METRIC_E2E,OTEL_LOG_E2E,INTEGRATION_FRAMEWORKS"
    weblogs:
      description: "Comma-separated list of weblogs to run (all weblogs if empty)"
      default: ""
    binaries_artifact:
      description: "Name of the upstream job whose artifacts contain the pre-built binaries to test"
      default: ""
    force_execute:
      description: "Comma-separated test node IDs to force-execute"
      default: ""
    skip_empty_scenarios:
      description: "Skip scenarios that contain only xfail or irrelevant tests"
      type: boolean
      default: false
    parametric_job_count:
      description: "Number of parallel jobs for the PARAMETRIC scenario"
      type: number
      default: 1
    push_to_test_optimization:
      description: "Push test results to Datadog Test Optimization"
      type: boolean
      default: false
    test_optimization_datadog_site:
      description: "Datadog site to use for Test Optimization"
      default: "datadoghq.com"
    auto_cancel_on_new_commit:
      description: "Auto-cancel strategy when a new commit is pushed (interruptible, conservative, disabled)"
      default: "interruptible"
    ref:
      description: "system-tests ref to use when called from another repository (branch, tag or SHA)"
      default: "main"
    ssi_library_version:
      description: "DD_INSTALLER_LIBRARY_VERSION to inject into generated jobs (Docker/K8s SSI)"
      default: ""
    k8s_lib_init_img:
      description: "K8S_LIB_INIT_IMG to inject into generated libinjection jobs"
      default: ""
    ssi_injector_version:
      description: "DD_INSTALLER_INJECTOR_VERSION to inject into generated dockerssi jobs"
      default: ""
---

include:
  - local: /utils/ci/gitlab/templates.yml
    inputs:
      stage: $[[ inputs.stage ]]
      ref: $[[ inputs.ref ]]
  # - local: /utils/ci/gitlab/ssi.yml
  #   inputs:
  #     stage: $[[ inputs.stage ]]
  #     libraries: $[[ inputs.libraries ]]
  #     scenarios: $[[ inputs.scenarios ]]
  #     scenarios_groups: $[[ inputs.scenarios_groups ]]
  #     ssi_library_version: $[[ inputs.ssi_library_version ]]
  #     k8s_lib_init_img: $[[ inputs.k8s_lib_init_img ]]
  #     ssi_injector_version: $[[ inputs.ssi_injector_version ]]

workflow:
  rules:
    - when: always
      auto_cancel:
        on_new_commit: $[[ inputs.auto_cancel_on_new_commit ]]

resolve_ci_image:
  image: registry.ddbuild.io/system-tests/git
  tags:
    - arch:amd64
  stage: $[[ inputs.stage ]]
  interruptible: true
  variables:
    GIT_STRATEGY: none
  needs:
    - job: build_ci_image
      optional: true
      artifacts: false
  script:
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.ddbuild.io/DataDog/system-tests.git
    - git -C system-tests checkout $[[ inputs.ref ]]
    - IMAGE_TAG=$(cat system-tests/utils/ci/gitlab/docker/system-tests.Dockerfile system-tests/requirements.txt | sha256sum | cut -c1-12)
    - echo "CI_IMAGE=registry.ddbuild.io/system-tests/ci-runner:$IMAGE_TAG" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

build_test_pipeline:
  extends: .system_tests_base
  tags:
    - arch:amd64
  needs:
    - job: resolve_ci_image
      artifacts: true
    - job: system-tests-param
      optional: true
      artifacts: true
  id_tokens:
    DD_STS_OIDC_TOKEN:
      aud: dd-sts
  script:
    - |
      libraries=$(echo "$[[ inputs.libraries ]],$LIBRARIES" | tr ',' ' ')
      scenarios=$(echo "$[[ inputs.scenarios ]],$SCENARIOS")
      scenario_groups=$(echo "$[[ inputs.scenarios_groups ]],$SCENARIO_GROUPS")
      echo "libraries:       $libraries"
      echo "scenarios:       $scenarios"
      echo "scenario_groups: $scenario_groups"
      count=0
      for lib in $libraries; do count=$((count + 1)); done
      half=$(( (count + 1) / 2 ))
      idx=0
      for library in $libraries; do
        [ $idx -lt $half ] && chunk=0 || chunk=1
        python3 utils/scripts/compute-workflow-parameters.py $library --format json --groups "$scenario_groups" --excluded-scenarios "$[[ inputs.excluded_scenarios ]],$EXCLUDED_SCENARIOS" --scenarios "$scenarios" --weblogs "$[[ inputs.weblogs ]],$WEBLOGS" --explicit-binaries-artifact "$[[ inputs.binaries_artifact ]]" --parametric-job-count $[[ inputs.parametric_job_count ]] --output params_${library}.json
        if [ ! -f generated-pipeline-chunk-${chunk}.yml ]; then
          python3 utils/ci/gitlab/build_pipeline.py --stage $[[ inputs.stage ]] --library $library --params params_${library}.json --ci-image "$CI_IMAGE" --ref "$[[ inputs.ref ]]" --push-to-test-optimization "$[[ inputs.push_to_test_optimization ]]" --test-optimization-datadog-site "$[[ inputs.test_optimization_datadog_site ]]" > generated-pipeline-chunk-${chunk}.yml
        else
          python3 utils/ci/gitlab/build_pipeline.py --stage $[[ inputs.stage ]] --library $library --params params_${library}.json --ci-image "$CI_IMAGE" --ref "$[[ inputs.ref ]]" --push-to-test-optimization "$[[ inputs.push_to_test_optimization ]]" --test-optimization-datadog-site "$[[ inputs.test_optimization_datadog_site ]]" --skip-header >> generated-pipeline-chunk-${chunk}.yml
        fi
        idx=$((idx + 1))
      done
      # Ensure chunk-1 always exists: trigger include requires both files regardless of library count
      if [ ! -f generated-pipeline-chunk-1.yml ] && [ -f generated-pipeline-chunk-0.yml ]; then
        first_job=$(grep -nm1 '^build_' generated-pipeline-chunk-0.yml | cut -d: -f1 || true)
        if [ -n "$first_job" ]; then
          head -n $((first_job - 1)) generated-pipeline-chunk-0.yml > generated-pipeline-chunk-1.yml
        else
          cp generated-pipeline-chunk-0.yml generated-pipeline-chunk-1.yml
        fi
      fi
  artifacts:
    paths:
      - system-tests/generated-pipeline-chunk-*.yml

run_test_pipeline:
  interruptible: true
  stage: $[[ inputs.stage ]]
  rules:
    - if: '"$[[ inputs.libraries ]],$LIBRARIES" =~ /\w/'
    - when: never
  needs:
    - job: build_test_pipeline
      optional: true
      artifacts: true
    - job: system-tests-param
      optional: true
      artifacts: true
  variables:
    SYSTEM_TESTS_FORCE_EXECUTE: "$[[ inputs.force_execute ]]"
    SYSTEM_TESTS_SKIP_EMPTY_SCENARIO: "$[[ inputs.skip_empty_scenarios ]]"
    LIBRARIES: $LIBRARIES
  trigger:
    include:
      - artifact: system-tests/generated-pipeline-chunk-0.yml
        job: build_test_pipeline
      - artifact: system-tests/generated-pipeline-chunk-1.yml
        job: build_test_pipeline
    strategy: depend

