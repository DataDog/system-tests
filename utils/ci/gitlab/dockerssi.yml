{% for scenario, weblogs in dockerssi_scenario_defs.items() %}
{% for weblog, archs in weblogs.items() %}
{% for arch_short, images in archs.items() %}
{% for img in images %}
{% for runtime in img.runtimes %}
{% set runtime_suffix = ('_' + runtime | replace('.', '_')) if runtime else '' %}
run_{{library}}_{{scenario}}_{{weblog}}_{{arch_short}}{{runtime_suffix}}:
  extends: .system_tests_base
  tags:
    - docker-in-docker:{{arch_short}}
  variables:
    KIND_EXPERIMENTAL_DOCKER_NETWORK: bridge
    TEST_LIBRARY: {{library}}
    SCENARIO: {{scenario}}
    ONBOARDING_FILTER_ENV: {{ci_environment}}
    WEBLOG: {{weblog}}
    IMAGE: {{img.image}}
    ARCH: linux/{{arch_short}}
    RUNTIME: "{{runtime}}"
    PRIVATE_DOCKER_REGISTRY: 235494822917.dkr.ecr.us-east-1.amazonaws.com
    PRIVATE_DOCKER_REGISTRY_USER: AWS
{% if ssi_library_version %}
    DD_INSTALLER_LIBRARY_VERSION: "{{ssi_library_version}}"
{% endif %}
{% if ssi_injector_version %}
    DD_INSTALLER_INJECTOR_VERSION: "{{ssi_injector_version}}"
{% endif %}
  script:
    - section_start "ecr_auth" "ECR auth"
    - aws ecr get-login-password | docker login --username ${PRIVATE_DOCKER_REGISTRY_USER} --password-stdin ${PRIVATE_DOCKER_REGISTRY}
    - section_end "ecr_auth"
    - section_start "build" "Building runner"
    - SYSTEM_TEST_BUILD_ATTEMPTS=3 SYSTEM_TEST_BUILD_TIMEOUT=240 ./build.sh -i runner
    - section_end "build"
    - section_start "run" "Running {{scenario}}"
    - >
      timeout 1200s ./run.sh $SCENARIO
      --ssi-weblog "$WEBLOG"
      --ssi-library "$TEST_LIBRARY"
      --ssi-base-image "$IMAGE"
      --ssi-arch "$ARCH"
      --ssi-installable-runtime "$RUNTIME"
      --ssi-env $ONBOARDING_FILTER_ENV
      --report-run-url ${CI_JOB_URL}
      --report-environment $ONBOARDING_FILTER_ENV
    - section_end "run"
  after_script: |
    SCENARIO_SUFFIX=$(echo "$SCENARIO" | tr "[:upper:]" "[:lower:]")
    mkdir -p reports/
    cp -R logs_"${SCENARIO_SUFFIX}" reports/ || true
  retry:
    max: 2
    when:
      - job_execution_timeout
      - unknown_failure
      - runner_system_failure
    exit_codes:
      - 3
      - 124
  artifacts:
    when: always
    paths:
      - system-tests/reports/

{% endfor %}
{% endfor %}
{% endfor %}
{% endfor %}
{% endfor %}
