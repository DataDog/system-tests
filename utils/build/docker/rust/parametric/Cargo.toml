[package]
name          = "ddtrace-rs-client"
version       = "0.0.1"
description   = "Dockerized Rust/Axum based HTTP server for System tests"
edition       = "2021"
license       = "Apache-2.0"
readme        = "README.md"
publish       = false

resolver      = "3"
rust-version  = "1.87" # should match Dockerfile rustc version

[[bin]]
name = "ddtrace-rs-client"
path = "src/main.rs"
doc = false
bench = false

[dependencies]
anyhow                  = { version = "1.0", features = [ "backtrace" ] }
axum                    = { version = "0.8.4", features = [ "http2", "json" ] }
configured              = { version = "0.7" }
humantime-serde         = { version = "1.1" }
hyper                   = { version = "1.0", features = ["client"] }
hyper-util              = { version = "0.1", features = ["tokio", "server-auto", "http1"] }
serde                   = { version = "1.0", features = [ "derive" ] }
serde_json              = { version = "1.0" }
time                    = { version = "0.3", features = [ "formatting" ] }
tokio                   = { version = "1", features = [ "macros", "rt-multi-thread", "signal" ] }
tower                   = { version = "0.5.2", features = [ "timeout" ] }
tower-http              = { version = "0.6.6", features = [ "trace" ] }
tracing                 = { version = "0.1", default-features = false }
tracing-subscriber      = { version = "0.3", default-features = false, features = [ "env-filter", "fmt", "json" ] }

# NOTE: the opentelemetry versions are managed by install_ddtrace.sh during the
# docker build. They MUST match whatever datadog-opentelemetry resolves to (which
# differs between the prod/crates.io and dev/main scenarios), so the script removes
# these deps, resolves datadog-opentelemetry, then re-pins them to the matching minor.
# The "*" requirement here is only used for local development.
opentelemetry           = { version = "*", features = ["logs"] }
opentelemetry_sdk       = { version = "*", features = ["logs"] }
opentelemetry-http      = { version = "*" }
opentelemetry-stdout    = { version = "*", features = ["trace", "logs"] }
opentelemetry-semantic-conventions = { version = "*" }


datadog-opentelemetry  = { path = "../../../../../binaries/dd-trace-rs/datadog-opentelemetry", features = ["metrics-grpc", "metrics-http", "logs-grpc", "logs-http"] }
