[package]
name = "weblog"
version = "0.0.1"
edition = "2021"
publish = false

[[bin]]
bench = false
doc = false
name = "weblog"
path = "src/main.rs"

[dependencies]
axum = { version = "0.8.8", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0" }
reqwest = { version = "0.12", default-features = false, features = ["json"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing = { version = "0.1", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false, features = [
  "env-filter",
  "fmt",
  "json",
] }
uuid = { version = "1", features = ["v4"] }

opentelemetry = { version = "*", features = ["logs"] }
opentelemetry-http = { version = "*" }

# Version changed at build time by install_ddtrace.sh
datadog-opentelemetry = { path = "../../../../../binaries/dd-trace-rs/datadog-opentelemetry", features = [
  "metrics-grpc",
  "metrics-http"
] }
