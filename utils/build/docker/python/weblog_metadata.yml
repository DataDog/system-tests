  python3_12:
    - utils/build/docker/python/django/requirements-python3.12.txt
  fastapi:
    - utils/build/docker/python/fastapi/requirements-fastapi.txt
  flask-poc:
    - utils/build/docker/python/flask/requirements-flask-poc.txt
  uwsgi-poc:
    - utils/build/docker/python/flask/requirements-uwsgi-poc.txt
  tornado:
    - utils/build/docker/python/tornado/requirements-tornado.txt
