[uwsgi]
http = :7777
module = app:app
# note, only thread mode is supported
# https://ddtrace.readthedocs.io/en/stable/advanced_usage.html#uwsgi
enable-threads = true
threads = 2
lazy-apps = true
import = ddtrace.auto
http-keepalive = 1
http-keepalive-requests = 100
http-keepalive-timeout = 15
master = true
processes = 2
die-on-term = true
py-call-osafterfork = true
hook-master-start = unix_signal:15 gracefully_kill_them_all
