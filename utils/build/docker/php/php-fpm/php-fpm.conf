# Redirect to local php-fpm if mod_php is not available
<IfModule !mod_phpPHP_MAJOR_VERSION.c>
<IfModule proxy_fcgi_module>
    # Enable http authorization headers
    <IfModule setenvif_module>
    SetEnvIfNoCase ^Authorization$ "(.+)" HTTP_AUTHORIZATION=$1
    </IfModule>
    <VirtualHost *:7777>
        # Trust Content-Length header from PHP-FPM instead of converting to chunked encoding
        # See: https://github.com/apache/httpd/blob/trunk/modules/proxy/mod_proxy_fcgi.c
        # mod_proxy_fcgi strips Content-Length by default; this preserves it
        SetEnv ap_trust_cgilike_cl 1
        ProxyErrorOverride on 404
        # Disable ProxyErrorOverride for endpoint_fallback.php to avoid duplicate traces
        # when testing 404 responses (RFC-1076 API Security sampling tests)
        <Location "/endpoint_fallback.php">
            ProxyErrorOverride off
        </Location>
        Include /var/www/html/rewrite-rules.conf
        RewriteRule "^/rasp/(.*)" "/rasp/$1.php" [L]
        RewriteRule "^/debugger$" "/debugger/"
        RewriteCond /var/www/html/%{REQUEST_URI} !-f
        RewriteRule "^/api_security.sampling/.*" "/api_security_sampling.php/$0" [L]
        RewriteRule "^/([^/]+)/(.*)" "/$1.php/$2" [L]
        ErrorDocument 404 /404.php
        <FilesMatch ".+\.ph(ar|p|tml)$">
            SetHandler "proxy:unix:/run/php/phpPHP_VERSION-fpm.sock|fcgi://localhost"
        </FilesMatch>
        <FilesMatch ".+\.phps$">
            # Deny access to raw php sources by default
            # To re-enable it's recommended to enable access to the files
            # only in specific virtual host or directory
            Require all denied
        </FilesMatch>
        # Deny access to files without filename (e.g. '.php')
        <FilesMatch "^\.ph(ar|p|ps|tml)$">
            Require all denied
        </FilesMatch>
    </VirtualHost>
</IfModule>
</IfModule>
