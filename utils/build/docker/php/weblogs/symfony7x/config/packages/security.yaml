security:
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username
    firewalls:
        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            stateless: false
            form_login:
                login_path: login
                check_path: login
                username_parameter: username
                password_parameter: password
                success_handler: App\Security\LoginSuccessHandler
                failure_handler: App\Security\LoginFailureHandler

    access_control: []
