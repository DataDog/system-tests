<IfModule mod_php%PHP_MAJOR_VERSION.c>
    <VirtualHost *:7777>
        DocumentRoot /var/www/html/public
        AllowEncodedSlashes NoDecode
        <Directory /var/www/html/public>
            AllowOverride All
            Require all granted
        </Directory>
    </VirtualHost>
    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
        Require all granted
    </FilesMatch>
    PHPIniDir "/etc/php/php.ini"
</IfModule>
